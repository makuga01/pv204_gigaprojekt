name: pv204_gigaprojekt

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-and-integration:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
      #- name: Run Unit Tests
      #  run: pytest tests/unit

      - name: Generate Docker Compose
        # generate a Docker Compose setup
        run: python quickrun.py 3 --threshold 2 --output docker-compose.generated.yml

      - name: Start Nodes
        # run generated a Docker Compose setup
        run: docker compose -f docker-compose.generated.yml up -d

      - name: Wait for Infrastructure Readiness
        run: |
          python - <<'PY'
          import time
          from urllib.request import urlopen
          from urllib.error import URLError, HTTPError

          URLS = [
            "http://localhost:8080/health",
            "http://localhost:8081/health",
            "http://localhost:8082/health",
            "http://localhost:5173/",
          ]

          timeout = 120
          interval = 2
          deadline = time.time() + timeout

          for url in URLS:
            while True:
              try:
                with urlopen(url, timeout=5) as response:
                  if response.status == 200:
                    print(f"ready: {url}")
                    break
              except (URLError, HTTPError):
                pass

              if time.time() >= deadline:
                raise SystemExit(f"Timed out waiting for {url}")

              time.sleep(interval)
          PY

      - name: Run Integration Tests
        run: pytest -v tests/test_integration.py

      - name: Cleanup
        # Even if some tests fail, we want to ensure we clean up the Docker containers
        if: always()
        run: |
          if [ -f docker-compose.generated.yml ]; then
            docker compose -f docker-compose.generated.yml down
          fi