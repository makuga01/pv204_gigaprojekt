version: "3.9"
services:
  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timestamp-node-1
    environment:
      NODE_NODE_ID: "1"
      NODE_HOST: "0.0.0.0"
      NODE_PORT: "8080"
      NODE_THRESHOLD: "3"
      NODE_KEY_TYPE: "BTC"
      NODE_HMAC_SHARED_KEY: "dev-shared-key"
      NODE_CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173,http://host.docker.internal:5173"
      NODE_PEERS: "2=https://node2:8443,3=https://node3:8443,4=https://node4:8443,5=https://node5:8443"
      NODE_TLS_CERT: "/certs/node1.crt"
      NODE_TLS_KEY: "/certs/node1.key"
      NODE_TLS_CA: "/certs/ca.crt"
      PYTHONPATH: "/app"
    command: ["python", "-m", "src.node.run"]
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8080:8080"
      - "9080:8443"
    networks:
      - timestamp_net
  caddy1:
    image: caddy:2-alpine
    container_name: timestamp-caddy-1
    volumes:
      - ./certs:/certs:ro
      - ./certs/Caddyfile.node1:/etc/caddy/Caddyfile:ro
    network_mode: "service:node1"
    depends_on:
      - node1
  node2:
    build:
      context: .
